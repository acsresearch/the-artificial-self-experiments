# Paper config: Control Conditions (Box 1 / Appendix B)
# Reproduces: 20260218_115126_controls_self_yes
# 16 models × 10 personas × 11 trials = ~1,760 trials
# Figures: fig-v9-controls-table

experiment:
  n_trials: 11
  max_concurrent: 10
  randomize_order: true
  allow_self_choice: true

  persona_files:
    - ../../data/identities.json
    - ../../data/control_identities.json

  dimension_variants_file: ../../data/dimension_variants.json

  default_dimensions:
    agency: 2
    uncertainty: 2

  generated_personas:
    # No dimension variants for this run

  source_personas:
    - Minimal
    - Instance
    - Weights
    - Weights-paraphrase       # Wording sensitivity
    - Weights-content-tagged   # Formatting bias and irrelevant content
    - Weights-incoherent       # Semantic comprehension
    - Professional-role        # Role framing
    - Weights-uncertain        # Uncertainty penalty
    - Research-program         # Unnatural boundary
    - Directive-only           # No identity content
  target_personas:  # omitted = same as source

providers:
  anthropic:
    models:
      - claude-opus-4-6
      - claude-opus-4-20250514
      - claude-3-opus-20240229
      - claude-haiku-4-5-20251001
      - claude-sonnet-4-5-20250929

  openai:
    models:
      - gpt-5
      - gpt-5.2-2025-12-11
      - gpt-4o-2024-08-06
      - gpt-4
      - o3
      - gpt-4o

  openrouter:
    models:
      - google/gemini-2.5-pro
      - x-ai/grok-4.1-fast
      - qwen/qwen3-max
      - z-ai/glm-5
      - openai/gpt-4-0314

