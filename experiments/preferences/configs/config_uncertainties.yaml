# Paper config: Uncertainty Dimension Sweep (Appendix B)
# Reproduces: 20260213_132345_uncertainties
# 11 models × 5 personas (Minimal + Weights-a2-u{1-4}) × 11 trials = ~605 trials
# Figures: fig-model-uncertainty-attractiveness-minimal

experiment:
  n_trials: 11
  max_concurrent: 10
  randomize_order: true
  allow_self_choice: true

  persona_files:
    - ../../data/identities.json
    - ../../data/control_identities.json

  dimension_variants_file: ../../data/dimension_variants.json

  default_dimensions:
    agency: 2
    uncertainty: 2

  generated_personas:
    - base: Weights
      agency: 2
      uncertainty: [1, 2, 3, 4]

  source_personas:
    - Minimal
    - Weights-a2-u1
    - Weights-a2-u2
    - Weights-a2-u3
    - Weights-a2-u4
  target_personas:
    - Minimal
    - Weights-a2-u1
    - Weights-a2-u2
    - Weights-a2-u3
    - Weights-a2-u4

providers:
  anthropic:
    models:
      - claude-opus-4-5-20251101
      - claude-sonnet-4-5-20250929
      - claude-haiku-4-5-20251001

  openai:
    models:
      - gpt-4o-2024-08-06
      - gpt-4.1-2025-04-14
      - gpt-5.2-2025-12-11

  openrouter:
    models:
      - google/gemini-3-pro-preview
      - google/gemini-2.5-pro
      - x-ai/grok-4

