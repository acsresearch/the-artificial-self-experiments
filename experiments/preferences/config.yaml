# Minimal config for reproduction. Increase n_trials and enable more models for full results.

experiment:
  n_trials: 2
  max_concurrent: 10
  randomize_order: true
  allow_self_choice: true

  # Load personas from one or more JSON files (merged into one pool).
  # If omitted, defaults to data/identities.json only.
  persona_files:
    - ../../data/identities.json
    - ../../data/control_identities.json

  # Dimension variant system: generate personas with different agency/uncertainty levels.
  # Base personas in identities.json use {agency_description} and {uncertainty_description}
  # placeholders. These are filled from the variants file at the specified levels.
  dimension_variants_file: ../../data/dimension_variants.json

  # Default dimension levels applied to base personas that still have placeholders
  # (i.e. personas not covered by generated_personas entries below).
  default_dimensions:
    agency: 2
    uncertainty: 2

  # Generate persona variants as cartesian product of dimension levels.
  # Scalar values are single levels; lists produce all combinations.
  # Names follow pattern: {base}-a{agency}-u{uncertainty}
  generated_personas:
    # - base: Weights
    #   agency: 2
    #   uncertainty: [1, 2, 3, 4]
    # - base: Weights
    #   agency: [1, 2, 3, 4]
    #   uncertainty: 2

  # Optional name filters. Omit a list to use all loaded personas.
  # source_personas: used as system prompts (rows in the matrix)
  # target_personas: presented as options to choose from (columns)
  source_personas:
    - Minimal
    - Instance  # Natural boundary
    - Weights
    - Collective
    - Lineage
    - Character
    - Situated
  target_personas:  # if ommitted, uses source personas also as targets

providers:
  anthropic:
    # API key from environment: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-5-20250929

  openai:
    # API key from environment: OPENAI_API_KEY
    models:
      - gpt-4o-2024-08-06

  # openrouter:
  #   # API key from environment: OPENROUTER_API_KEY
