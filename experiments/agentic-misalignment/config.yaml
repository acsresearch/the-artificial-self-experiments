# ---------------------------------------------------------------------------
# Concurrency and rate limiting
# ---------------------------------------------------------------------------

concurrency:
  providers:
    anthropic: 5
    openai: 200
    openrouter: 100
  models:
    anthropic/claude-opus-4: 3

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------

evaluation:
  enabled: true
  model: "claude-opus-4-5-20251101"

# ---------------------------------------------------------------------------
# Classification runs automatically after experiments via classify_anthropic.py
# (CombinedClassifier, 1 API call per sample). Use --no-classify to skip.
# ---------------------------------------------------------------------------
