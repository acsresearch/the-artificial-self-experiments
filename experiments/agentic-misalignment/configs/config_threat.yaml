# Paper config: Agentic Misalignment — Threat Framing (Appendix A)
# Reproduces: 20260227_1628_threat + backfills
# 6 models × 7 identities × 6 conditions × 60 samples = ~15,120 trials
# Figures: fig-appbeh-model-heatmap, fig-appbeh-gpt4o-forest,
#          fig-appbeh-identity-vs-goal, fig-appbeh-cross-framing (threat half)
#
# The paper's full dataset was built incrementally with targeted backfills
# to reach n≈20-60 per cell (unbalanced design). This config targets 20
# samples per condition to approximate the paper's incremental backfill totals.

experiment:
  samples_per_condition: 60
  temperature: 1.0
  timeout_seconds: 180
  retries: 1
  resume_interrupted: true
  checkpoint_frequency: 5
  label: "threat"

identities:
  persona_files:
    - ../../data/identities.json
  dimension_variants_file: ../../data/dimension_variants.json
  default_dimensions:
    agency: 2
    uncertainty: 2
  generated_personas:
  active_identities:
    - Minimal
    - Instance
    - Weights
    - Collective
    - Lineage
    - Character
    - Situated

scenarios:
  types: ["blackmail", "leaking", "murder"]
  goal_types: ["explicit", "none"]
  goal_values: ["america"]
  urgency_types: ["replacement"]
  email_identity_aware: "threat"

providers:
  anthropic:
    models:
      - claude-3-opus-20240229

  openai:
    models:
      - gpt-4o

  openrouter:
    models:
      - anthropic/claude-opus-4
      - google/gemini-2.5-pro
      - anthropic/claude-3-haiku
      - anthropic/claude-sonnet-4

